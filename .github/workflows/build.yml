name: Build

on:
  push:
    branches: [main, oneplus5-support]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GRADLE_OPTS: --add-opens java.base/java.lang=ALL-UNNAMED --add-opens java.base/java.util=ALL-UNNAMED

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Accept licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
      
      - name: Make build script executable
        run: chmod +x build.sh
      
      - name: Build APK and Magisk Module
        run: ./build.sh
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME || env.ANDROID_SDK_ROOT }}
          # AGP 8.2.2 needs JAXB on JDK 17+
          _JAVA_OPTIONS: "--add-modules java.xml.bind"
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gateway-apk
          path: gateway.apk
          if-no-files-found: warn
      
      - name: Upload Magisk Module
        uses: actions/upload-artifact@v4
        with:
          name: gateway-magisk-module
          path: gateway-magisk.zip
          if-no-files-found: warn
